<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <!-- Login Card -->
    <div class="login-card text-center p-4 shadow">

        <!-- Toggle Help -->
        <details ontoggle="alert('TEST CREDENTIALS: \nUser: admin \nPass: 12345')">
            <summary class="btn btn-sm btn-outline-dark mb-3">Instructions</summary>
            <p class="small text-light">Use the credentials shown.</p>
        </details>

        <h2 class="mb-3">🔒 Login</h2>

        <input type="text" id="username" class="form-control mb-3" placeholder="Enter username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter password">

        <div class="form-check text-start mb-3">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label text-dark">Stay logged in</label>
        </div>

        <button class="btn btn-info me-2" onclick="login()">Login</button>
        <button class="btn btn-secondary" onclick="clearFields()">Cancel</button>

        <p class="mt-3 small">
            <a href="https://www.w3schools.com" target="_blank">Forgot username / password?</a>
        </p>

        <div id="result" class="mt-2"></div>

    </div>
</div>

<script src="main.js"></script>
</body>
</html>
